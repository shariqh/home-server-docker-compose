services:
  plex:
    image: ghcr.io/linuxserver/plex:latest
    container_name: plex
    network_mode: host # https://docs.docker.com/network/host/
    restart: unless-stopped
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - VERSION=docker
    volumes:
      - /mnt/media/tv:/tv
      - /mnt/media/movies:/movies
      - /mnt/media/books:/books
      - /mnt/media/music:/music
      - /mnt/media/courses:/courses
      - ../appdata/plex:/config
    devices:
      - /dev/dri:/dev/dri # Intel Quicksync

  radarr:
    image: ghcr.io/linuxserver/radarr:latest
    container_name: radarr
    restart: unless-stopped
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - /mnt/media/movies:/movies
      - /mnt/media/downloads:/downloads
      - ../appdata/radarr:/config
    ports:
      - "7878:7878"

  sonarr:
    image: ghcr.io/linuxserver/sonarr:latest
    container_name: sonarr
    restart: unless-stopped
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - /mnt/media/tv:/tv
      - /mnt/media/downloads:/downloads
      - ../appdata/sonarr:/config
    ports:
      - "8989:8989"

  lidarr:
    image: lscr.io/linuxserver/lidarr:latest
    container_name: lidarr
    restart: unless-stopped
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - /mnt/media/music:/music
      - /mnt/media/downloads:/downloads
      - ../appdata/lidarr/custom-services.d:/custom-services.d
      - ../appdata/lidarr/custom-cont-init.d:/custom-cont-init.d
      - ../appdata/lidarr:/config
    ports:
      - "8686:8686"

  jackett:
    image: ghcr.io/linuxserver/jackett:latest
    container_name: jackett
    restart: unless-stopped
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - AUTO_UPDATE=true
    volumes:
      - /mnt/media/downloads:/data/completed
      - ../appdata/jackett:/config
    ports:
      - "9117:9117"

  qbittorrent-wireguard:
    image: binhex/arch-qbittorrentvpn:latest
    container_name: qbittorrent-wireguard
    restart: unless-stopped
    privileged: true
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
    volumes:
      - /mnt/media/downloads:/downloads
      - ../appdata/qbittorrent-wireguard:/config
      - /etc/localtime:/etc/localtime:ro
    environment:
      - VPN_ENABLED=yes
      - VPN_USER=${PIA_USERNAME}
      - VPN_PASS=${PIA_PASSWORD}
      - VPN_PROV=pia
      - VPN_CLIENT=wireguard
      - STRICT_PORT_FORWARD=yes
      - ENABLE_PRIVOXY=no
      - LAN_NETWORK=192.168.1.0/24
      - NAME_SERVERS=${NAME_SERVERS}
      - DEBUG=false
      - WEBUI_PORT=8080
      - UMASK=000
      - PUID=${PUID}
      - PGID=${PGID}
    ports:
      - "6881:6881"
      - "6881:6881/udp"
      - "8080:8080"

  audiobook-organizer:
    build: ./audiobook-organizer
    image: audiobook-organizer:latest
    container_name: audiobook-organizer
    restart: unless-stopped
    # Run as 1000:1000 (not root) so writes land correctly on the
    # Synology-backed /mnt/media share, matching the other media services.
    user: "${PUID}:${PGID}"
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - BEETSDIR=/config
      # give the non-root (1000) user a writable HOME so caches (tldextract,
      # etc.) land under /config instead of the unwritable /.cache
      - HOME=/config
      # Plex endpoint for the post-organize cover + collection sync (plex_sync.py).
      # Plex runs network_mode:host, reached via the host gateway below.
      - PLEX_URL=http://host.docker.internal:32400
    # reach the host (for Plex on :32400) from this bridge container
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # use public resolvers directly — the host/embedded DNS was intermittently
    # failing to resolve the Audible API + cover CDN mid-run
    dns:
      - 1.1.1.1
      - 8.8.8.8
    volumes:
      - /mnt/media/audiobook-inbox:/inbox
      - /mnt/media/books:/books
      - ../appdata/audiobook-organizer:/config
      - ./audiobook-organizer/config.yaml:/config/config.yaml:ro
      # read-only access to Plex's token so plex_sync.py can call the API
      # without storing a separate secret
      - "../appdata/plex/Library/Application Support/Plex Media Server/Preferences.xml:/plex-prefs.xml:ro"

  audiobookshelf:
    image: ghcr.io/advplyr/audiobookshelf:latest
    container_name: audiobookshelf
    restart: unless-stopped
    environment:
      - TZ=${TZ}
    dns:
      - 1.1.1.1
      - 8.8.8.8
    volumes:
      - /mnt/media/books:/audiobooks
      - ../appdata/audiobookshelf/config:/config
      - ../appdata/audiobookshelf/metadata:/metadata
    ports:
      - "13378:80"
