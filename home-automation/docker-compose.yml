services:
  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:stable
    container_name: homeassistant
    user: "${PUID}:${PGID}"
    restart: unless-stopped
    privileged: true
    network_mode: host
    volumes:
      - ../appdata/homeassistant:/config
      - /etc/localtime:/etc/localtime:ro
    environment:
      - TZ=${TZ}
    # devices:
    #   - /dev/serial/by-id/usb-Zooz_800_Z-Wave_Stick_533D004242-if00:/dev/ttyACM0

  zwave-js-ui:
    image: zwavejs/zwave-js-ui:latest
    container_name: zwave-js-ui
    restart: unless-stopped
    privileged: true
    ports:
      - "8091:8091" # Z-Wave JS UI configuration panel
      - "3000:3000" # Z-Wave JS server websocket
    devices:
      - /dev/serial/by-id/usb-Zooz_800_Z-Wave_Stick_533D004242-if00:/dev/zwave
    volumes:
      - ../appdata/zwave-js-ui:/usr/src/app/store
    environment:
      - TZ=${TZ}
